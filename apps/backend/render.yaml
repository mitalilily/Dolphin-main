services:
  - type: web
    name: delexpress-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
        # Set this to the full Railway Postgres connection string
        # Example: postgresql://user:password@host:5432/database?sslmode=require
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COURIER_SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRY
        value: 30m
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_SMTP_USER
        sync: false
      - key: GOOGLE_SMTP_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILLIO_SENDGRID_API_KEY
        sync: false
      - key: RAZORPAY_MODE
        value: test
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: DEV_BUCKET
        sync: false
      - key: STAGING_BUCKET
        sync: false
      - key: SHIPMOZO_API_BASE
        sync: false
      - key: SHIPMOZO_PUBLIC_KEY
        sync: false
      - key: SHIPMOZO_PRIVATE_KEY
        sync: false
      - key: SHIPMOZO_USERNAME
        sync: false
      - key: SHIPMOZO_PASSWORD
        sync: false
      - key: SHIPMOZO_DEFAULT_WAREHOUSE_ID
        sync: false
      - key: SHIPROCKET_API_BASE
        sync: false
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHIPROCKET_DEFAULT_PICKUP_LOCATION
        sync: false
      - key: SHIPROCKET_DEFAULT_CHANNEL_ID
        sync: false
      - key: ICARRY_API_BASE
        sync: false
      - key: ICARRY_USERNAME
        sync: false
      - key: ICARRY_API_KEY
        sync: false
      - key: ICARRY_PASSWORD
        sync: false
      - key: ICARRY_CLIENT_ID
        sync: false
      - key: ICARRY_WEBHOOK_TOKEN
        sync: false

databases:
  - name: delexpress-postgres
    databaseName: delexpress
